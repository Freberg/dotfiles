# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Window management
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod SHIFT, P, layoutmsg, swapwithmaster
bind = $mainMod SHIFT, O, layoutmsg, focusmaster
# Toggle between Master and Scrolling
bind = $mainMod, b, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout -j | grep -q "scrolling" && echo "master" || echo "scrolling")"

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# master layout binds
bind = $mainMod SHIFT, h, layoutmsg, addmaster
bind = $mainMod SHIFT, l, layoutmsg, removemaster
bind = $mainMod, f, layoutmsg, mfact +0.25
bind = $mainMod, d, layoutmsg, mfact -0.25

# scrolling layout binds
bind = $mainMod SHIFT, h, layoutmsg, swapcol l
bind = $mainMod SHIFT, l, layoutmsg, swapcol r
bind = $mainMod, f, layoutmsg, colresize +conf
bind = $mainMod, d, layoutmsg, colresize -conf

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move workspaces between monitors
bind = $mainMod CTRL, p, movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL, n, movecurrentworkspacetomonitor, +1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Launchers
bind = $mainMod, Q, exec, uwsm app -- kitty
bind = $mainMod, R, exec, ~/.config/scripts/ui/app_menu.sh
bind = $mainMod, V, exec, ~/.config/scripts/ui/cliphist_menu.sh
bind = $mainMod, P, exec, grimshot copy area && notify-send 'Print Screen' 'Area copied to clipboard'
bind = $mainMod ALT, P, exec, grimshot save area - | satty --early-exit -f - -o - | wl-copy
bind = $mainMod, O, exec, f=/tmp/ocr.png; grimshot save area $f && (tesseract $f - | wl-copy && notify-send 'OCR' 'Text copied to clipboard'; rm -f $f)
bind = $mainMod, Tab, exec, ~/.config/scripts/ui/window_menu.sh

# Media keys
bind = ,XF86AudioRaiseVolume, exec, pamixer -u -i 5
bind = ,XF86AudioLowerVolume, exec, pamixer -u -d 5
bind = ,XF86AudioMute, exec, pamixer -t
bind = ,XF86MonBrightnessUp, exec, light -A 5
bind = ,XF86MonBrightnessDown, exec, light -U 5

# Exit & Lock
bind = $mainMod, M, exit,
bind = $mainMod ALT, L, exec, hyprlock
bindl = ,switch:on:Lid Switch, exec, hyprlock
